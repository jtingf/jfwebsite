<!DOCTYPE html>

  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    html, body {
      height: 100%; width: 100%; margin: 0; padding: 0;
      font-family: 'Comfortaa', sans-serif;
      background: linear-gradient(to bottom, #ffffff, #e7faff);
      background-image: url('./paw-bg.png');
      background-repeat: repeat;
      background-size: 320px 320px;
      display: flex; flex-direction: column;
    }
    .topbar {
      width: 100%;

    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; margin-top: 4px; }
    .nav-links a {
      color: white; text-decoration: none; font-size: 16px;
      padding: 6px 10px; border-radius: 6px; transition: background 0.3s, transform 0.3s;
    }
    .nav-links a:hover { background-color: #555; transform: scale(1.05); }
    main {
      flex-grow: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 24px; color: #333;
    }
    main .big { font-size: 60px; }
    main h1 { margin: 0; font-size: 26px; }
    main p { margin: 0; color: #667; }
    main a.back {
      margin-top: 10px; background: #00cfe8; color: white;
      text-decoration: none; font-weight: bold;
      padding: 10px 18px; border-radius: 10px;
    }
  </style>
</head>
<body>
